<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ralph Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet">
    <script>
      // Resolve theme pre-hydration so the background doesn't flash the
      // wrong color on first paint.
      (function () {
        const saved = localStorage.getItem('ralph.theme');
        const mode = saved || 'system';
        const mql = window.matchMedia('(prefers-color-scheme: dark)');
        const resolved = mode === 'system' ? (mql.matches ? 'dark' : 'light') : mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeMode = mode;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
